    function toggleTheme() {
      const isDark = document.body.classList.toggle('dark');
      localStorage.setItem('theme', isDark ? 'dark' : 'light');
    }

    function setLanguage(lang) {
      localStorage.setItem('lang', lang);
      document.getElementById('title').textContent = translations.title[lang];
      renderActivities(lang);
      document.documentElement.dir = (lang === 'ar') ? 'rtl' : 'ltr';
    }

    function buildWhatsAppLink(name, lang) {
      const phone = "905492271009";
      const msgTemplateFn = translations.waTemplate[lang] || translations.waTemplate.tr;
      const text = msgTemplateFn(name);
      return `https://wa.me/${phone}?text=${encodeURIComponent(text)}`;
    }

    function renderActivities(lang) {
      const container = document.getElementById('activities');
      container.innerHTML = '';
      translations.activities.forEach(item => {
        const card = document.createElement('div');
        card.className = 'card';

        const displayName = item.name[lang];
        const waHref = buildWhatsAppLink(displayName, lang);
        const waLabel = translations.waLabel[lang];

        const nameHtml = item.link && item.link.trim() !== ''
          ? `<h3><a href="${item.link}" target="_blank" rel="noopener noreferrer" title="Instagram videosunu aç">${displayName}</a></h3>`
          : `<h3>${displayName}</h3>`;

        card.innerHTML = `
          <img src="${item.image}" alt="${displayName}">
          <div class="card-content">
            ${nameHtml}
            <p>${item.desc[lang]}</p>
            <a class="wa-btn" href="${waHref}" target="_blank" rel="noopener noreferrer" aria-label="WhatsApp ile ${displayName} hakkında bilgi iste">
              ${waLabel}
            </a>
          </div>
          <div class="price">${item.price}</div>
        `;
        container.appendChild(card);
      });
    }

    const savedTheme = localStorage.getItem('theme');
    if (savedTheme === 'dark') document.body.classList.add('dark');

    const savedLang = localStorage.getItem('lang') || 'tr';
    document.getElementById('language').value = savedLang;
    setLanguage(savedLang);

    document.getElementById('language').addEventListener('change', (e) => {
      setLanguage(e.target.value);
    });
  </script>
